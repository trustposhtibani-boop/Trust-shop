<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>محصولات تراست</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#16c79a">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: Tahoma, Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }
  img.logo {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(22,199,154,0.5);
  }
  h1 { font-size: 22px; margin-bottom: 10px; }
  p { color: #cfd8dc; margin-bottom: 30px; max-width: 320px; line-height: 1.8; }
  button {
    background: #16c79a;
    color: #1a1a2e;
    border: none;
    padding: 14px 30px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(22,199,154,0.4);
  }
  button:active { transform: scale(0.97); }
  #status { margin-top: 20px; font-size: 14px; color: #9e9e9e; }
  a.visit-link {
    margin-top: 25px;
    color: #16c79a;
    text-decoration: none;
    font-size: 14px;
  }
</style>
</head>
<body>

  <img src="icon-512.png" class="logo" alt="لوگو">
  <h1>محصولات تراست</h1>
  <p>اپلیکیشن ما رو روی گوشیت نصب کن و همیشه یک کلیک تا خرید فاصله داشته باش!</p>

  <button id="installBtn">📲 نصب اپلیکیشن</button>
  <div id="status"></div>

  <a class="visit-link" href="https://trustara.ir" target="_blank">یا از همینجا وارد فروشگاه شو ↗</a>

<script>
  let deferredPrompt;
  const installBtn = document.getElementById('installBtn');
  const status = document.getElementById('status');

  // ثبت service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('Service worker ثبت شد'))
      .catch(err => console.log('خطا در ثبت service worker:', err));
  }

  // گرفتن رویداد نصب (اندروید/کروم)
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'inline-block';
  });

  installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        status.textContent = '✅ با موفقیت نصب شد!';
      }
      deferredPrompt = null;
    } else {
      // برای آیفون (سافاری) که beforeinstallprompt نداره
      const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
      if (isIOS) {
        status.innerHTML = 'در سافاری: روی دکمه اشتراک‌گذاری 🔗 بزن، بعد گزینه «Add to Home Screen» رو انتخاب کن.';
      } else {
        status.textContent = 'مرورگرت از نصب مستقیم پشتیبانی نمی‌کنه، از منوی مرورگر گزینه «Add to Home Screen» رو بزن.';
      }
    }
  });

  // وقتی قبلاً نصب شده
  window.addEventListener('appinstalled', () => {
    status.textContent = '✅ اپلیکیشن نصب شد!';
  });
</script>

</body>
</html>
